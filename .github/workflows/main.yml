name: Fortify on Demand Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  FoD-SAST-Scan:
    runs-on: ubuntu-latest   # Ubuntu only

    # (Optional) If you enable SARIF export/PR comments later, uncomment:
    # permissions:
    #   contents: read
    #   security-events: write
    #   pull-requests: write

    env:
      # ---- Fortify on Demand connection/auth ----
      FOD_URL: https://ams.fortify.com
      FOD_TENANT: ${{ secrets.FOD_TENANT }}
      FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
      FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
      FOD_RELEASE: ${{ secrets.FOD_RELEASE_ID }}

      # ---- Packaging & scan behavior ----
      PACKAGE_EXTRA_OPTS: -bt mvn   # (current name; replaces deprecated EXTRA_PACKAGE_OPTS)
      DO_WAIT: true                 # wait for SAST completion
      DO_EXPORT: true               # export results to GitHub code scanning (requires GHAS on private repos)
      DO_PACKAGE_DEBUG: true        # keep package.zip & logs as artifacts for troubleshooting
      FCLI_BOOTSTRAP_VERSION: v3.15 # pin fcli for stability

      # Increase HTTP socket timeout for large uploads to FoD
      FOD_LOGIN_EXTRA_OPTS: --socket-timeout=120s

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Environment info (debug)
        run: |
          echo "Runner:"; uname -a
          echo "Disk:"; df -h
          echo "Memory:"; (free -h || true)
          echo "Java:"; java -version

      - name: Run Fortify scans (FoD SAST via fcli CI)
        uses: fortify/github-action@v3
        with:
          debug: true
